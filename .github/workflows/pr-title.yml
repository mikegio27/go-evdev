name: PR Title

# Enforce Conventional Commits on the PR title. With squash-merge the PR title
# becomes the commit subject that go-semantic-release parses, so this keeps the
# release pipeline from silently skipping a release on a malformed message.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
