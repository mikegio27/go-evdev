name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # Gated on green test + lint; only cuts a release on push to main.
  release:
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the tag and create the GitHub Release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semrel needs full history + tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog-file: CHANGELOG.md
          changelog-generator-opt: "emojis=true"
          # allow-initial-development-versions left disabled (default) so the
          # first release promotes v0.0.13 -> v1.0.0; thereafter normal semver.
